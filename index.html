<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27 NUTS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    /* ── 背景 ── */
    body {
      background: #0c0c0c;
      background-image:
        repeating-linear-gradient(45deg,  rgba(255,255,255,0.01) 0 1px, transparent 1px 6px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 6px);
      font-family: 'Oswald', 'Arial Black', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶栏 ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px 14px;
      border-bottom: 1px solid rgba(201,149,58,0.25);
      flex-shrink: 0;
      position: relative;
    }

    .brand {
      color: #c9953a;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(201,149,58,0.6);
    }

    .level-info {
      color: rgba(201,149,58,0.65);
      font-size: clamp(12px, 1.4vw, 18px);
      letter-spacing: 2px;
      text-align: center;
    }

    .progress-wrap {
      width: 180px;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 5px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #7a5010, #c9953a, #ffd97a);
      transition: width 1s linear;
    }

    .topbar-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    /* ── 主内容：三列 ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 0;
      padding: 0 24px;
      min-height: 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    /* 左列 — 总杯数 */
    .col-cups {
      border-right: 1px solid rgba(201,149,58,0.15);
    }

    .cups-label {
      color: #c9953a;
      font-size: clamp(24px, 3.5vw, 48px);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .cups-number {
      color: #f5f0e8;
      font-size: clamp(100px, 18vw, 200px);
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 0 60px rgba(245,240,232,0.2);
    }

    .cup-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    /* 中列 — 计时 */
    .col-timer { gap: 10px; }

    .timer-digits {
      font-size: clamp(90px, 18vw, 200px);
      font-weight: 700;
      color: #f5f0e8;
      font-family: 'Courier New', monospace;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 40px rgba(245,240,232,0.2);
      transition: color 0.3s;
    }
    .timer-digits.warning {
      color: #e05a3a;
      text-shadow: 0 0 30px rgba(224,90,58,0.8);
      animation: blink .55s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .blind-now-big {
      color: rgba(255,255,255,0.9);
      font-size: clamp(32px, 6vw, 76px);
      font-weight: 700;
      letter-spacing: 2px;
    }

    .next-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      margin-top: 6px;
    }
    .next-label {
      color: #c9953a;
      font-size: clamp(11px, 1.2vw, 16px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .next-value {
      color: rgba(245,240,232,0.45);
      font-size: clamp(18px, 2.8vw, 38px);
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* 右列 — 筹码 2×2 */
    .col-next {
      border-left: 1px solid rgba(201,149,58,0.15);
    }

    /* 筹码 2×2 网格 */
    .chips-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 6px;
      align-items: center;
      justify-items: center;
    }

    /* 可编辑桌名 */
    .table-title-wrap {
      display: flex; align-items: center; gap: 6px;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .table-title {
      color: #c9953a;
      font-size: clamp(28px, 4vw, 56px);
      letter-spacing: 3px;
      text-transform: uppercase;
      outline: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
      cursor: text;
      min-width: 30px;
      text-align: center;
    }
    .table-title:focus { border-bottom-color: #c9953a; }
    .edit-icon { color: rgba(201,149,58,.35); font-size:12px; cursor:pointer; }
    .edit-icon:hover { color:#c9953a; }

    /* ── 底栏 ── */
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px 16px;
      border-top: 1px solid rgba(201,149,58,0.2);
      gap: 16px;
      flex-shrink: 0;
    }

    .chip-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .chip-wrap svg {
      width: clamp(90px, 13vw, 160px);
      height: clamp(90px, 13vw, 160px);
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
    }

    .chip-label {
      color: rgba(255,255,255,0.55);
      font-size: clamp(20px, 2.8vw, 36px);
      letter-spacing: 1px;
    }

    /* ── 控制区（平板可见，TV模式隐藏）── */
    .controls-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(12px, 1.3vw, 16px);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: transform .12s, filter .12s;
      white-space: nowrap;
    }
    .btn:hover  { transform:scale(1.06); filter:brightness(1.15); }
    .btn:active { transform:scale(0.95); }

    .btn-start  { background:linear-gradient(135deg,#2d6a30,#3d9142); color:#fff; }
    .btn-pause  { background:linear-gradient(135deg,#7a3d10,#c96820); color:#fff; }
    .btn-reset  { background:linear-gradient(135deg,#6a1515,#a02020); color:#fff; }
    .btn-cup-add { background:linear-gradient(135deg,#a07018,#c9953a); color:#0c0c0c; font-size:clamp(16px,2vw,22px); padding:5px 14px; border-radius:8px; font-weight:900; }
    .btn-cup-sub { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.55); font-size:clamp(16px,2vw,22px); padding:5px 14px; border-radius:8px; font-weight:900; }

    .settings-inline {
      display: flex; align-items: center; gap: 8px;
    }
    .settings-label { color:rgba(201,149,58,0.5); font-size:12px; letter-spacing:1px; text-transform:uppercase; }
    .settings-input {
      background:rgba(0,0,0,0.4); border:1px solid rgba(201,149,58,0.3);
      color:#c9953a; padding:6px 8px; border-radius:6px; width:52px;
      text-align:center; font-size:14px; font-family:'Oswald',sans-serif; font-weight:bold;
    }
    .settings-input:focus { outline:none; border-color:#c9953a; }

    /* 右下角浮动加减酒 */
    .cup-float {
      position: fixed;
      bottom: 24px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 50;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(201,149,58,0.3);
      border-radius: 12px;
      padding: 8px 14px;
    }
    .cup-float-label {
      color: #c9953a;
      font-size: clamp(11px, 1.2vw, 15px);
      letter-spacing: 2px;
    }
    /* TV模式切换 */
    .tv-btn {
      background: none;
      border: 1px solid rgba(201,149,58,0.3);
      border-radius: 8px;
      color: rgba(201,149,58,0.5);
      cursor: pointer;
      font-size: 26px;
      padding: 8px 14px;
      transition: all .2s;
    }
    .tv-btn:hover { color:#c9953a; border-color:#c9953a; }

    /* TV模式：隐藏控制 */
    body.tv-mode .controls-area { display:none; }
    body.tv-mode .cup-btns      { display:none; }
    body.tv-mode .tv-btn        { opacity:.15; }
    body.tv-mode .tv-btn:hover  { opacity:1; }

    /* ── 涨盲动画 ── */
    .level-flash {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(0,0,0,0.82);
      pointer-events: none;
      opacity: 0;
    }
    .level-flash.show {
      animation: flashAnim 3.2s ease forwards;
    }
    @keyframes flashAnim {
      0%   { opacity:0; }
      12%  { opacity:1; }
      75%  { opacity:1; }
      100% { opacity:0; }
    }
    .lf-tag {
      color: #c9953a;
      font-size: clamp(18px, 2.5vw, 32px);
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: none;
    }
    .lf-blinds {
      color: #f5f0e8;
      font-size: clamp(60px, 12vw, 140px);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 60px rgba(201,149,58,0.9), 0 0 120px rgba(201,149,58,0.4);
      animation: scaleIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay: 0.15s;
    }
    .lf-level {
      color: rgba(201,149,58,0.7);
      font-size: clamp(14px, 1.8vw, 22px);
      letter-spacing: 4px;
    }
    @keyframes scaleIn {
      from { transform: scale(0.6); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }
    .lf-bar {
      width: clamp(160px, 20vw, 280px); height: 3px;
      background: linear-gradient(90deg, transparent, #c9953a, transparent);
      border-radius: 2px;
    }

    /* ── 结束遮罩 ── */
    .finished-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85);
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:20px; z-index:100;
    }
    .finished-overlay.show { display:flex; }
    .finished-text { color:#c9953a; font-size:clamp(40px,7vw,80px); font-weight:700; letter-spacing:6px; text-shadow:0 0 40px rgba(201,149,58,0.8); }

    /* ── 密码浮窗 ── */
    #pw-overlay {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
    }
    #pw-overlay.hidden { display:none; }

    .pw-box {
      background:linear-gradient(160deg,#1c1c1c,#141414);
      border:1px solid rgba(201,149,58,0.4); border-radius:14px;
      padding:32px 28px 24px; display:flex; flex-direction:column;
      align-items:center; gap:16px; min-width:260px; position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
    }
    .pw-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0;
      background:linear-gradient(90deg,transparent,#c9953a,transparent);
    }
    .pw-title { color:#c9953a; font-size:15px; letter-spacing:3px; text-transform:uppercase; }
    .pw-input {
      background:rgba(0,0,0,0.4); border:1px solid rgba(201,149,58,0.3);
      border-radius:8px; color:#f5f0e8; font-family:'Oswald',sans-serif;
      font-size:22px; letter-spacing:6px; text-align:center;
      padding:10px 16px; width:100%; outline:none; transition:border-color .2s;
    }
    .pw-input:focus { border-color:#c9953a; }
    .pw-error { color:#e05a3a; font-size:12px; letter-spacing:2px; height:16px; text-transform:uppercase; }
    .pw-error.shake { animation:pwshake .35s ease; }
    @keyframes pwshake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .pw-btn {
      background:linear-gradient(135deg,#a07018,#c9953a); border:none; border-radius:8px;
      color:#0c0c0c; font-family:'Oswald',sans-serif; font-size:14px; font-weight:700;
      letter-spacing:2px; padding:10px 32px; cursor:pointer; transition:filter .15s,transform .12s;
    }
    .pw-btn:hover { filter:brightness(1.12); }
    .pw-btn:active { transform:scale(0.96); }

    /* ── 配置按钮 ── */
    .cfg-btn {
      background: none;
      border: 1px solid rgba(201,149,58,0.3);
      border-radius: 8px;
      color: rgba(201,149,58,0.5);
      cursor: pointer;
      font-size: 26px;
      padding: 8px 14px;
      transition: all .2s;
    }
    .cfg-btn:hover { color:#c9953a; border-color:#c9953a; }

    /* ── 配置弹窗 ── */
    #cfg-overlay {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    #cfg-overlay.hidden { display: none; }

    .cfg-box {
      background: linear-gradient(160deg,#1c1c1c,#141414);
      border: 1px solid rgba(201,149,58,0.4); border-radius: 14px;
      padding: 28px 28px 22px; min-width: 300px; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7); position: relative;
    }
    .cfg-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0;
      background:linear-gradient(90deg,transparent,#c9953a,transparent);
    }
    .cfg-title {
      color: #c9953a; font-size: 14px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 18px; text-align: center;
    }
    .cfg-levels {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 16px; max-height: 320px; overflow-y: auto;
      padding-right: 4px; margin-bottom: 18px;
    }
    .cfg-levels::-webkit-scrollbar { width: 4px; }
    .cfg-levels::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
    .cfg-levels::-webkit-scrollbar-thumb { background: rgba(201,149,58,0.4); border-radius: 2px; }

    .cfg-level-item {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 5px 8px; border-radius: 6px;
      transition: background .15s;
    }
    .cfg-level-item:hover { background: rgba(201,149,58,0.08); }
    .cfg-level-item input[type=checkbox] {
      accent-color: #c9953a; width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
    }
    .cfg-level-text {
      color: rgba(245,240,232,0.75); font-size: 13px; letter-spacing: 1px;
      font-family: 'Oswald', sans-serif;
    }

    .cfg-actions {
      display: flex; gap: 10px; justify-content: flex-end; align-items: center;
    }
    .cfg-select-all {
      color: rgba(201,149,58,0.5); font-size: 11px; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer; flex: 1;
      background: none; border: none; font-family: 'Oswald',sans-serif;
      text-align: left; padding: 0;
    }
    .cfg-select-all:hover { color: #c9953a; }
    .cfg-cancel {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: rgba(255,255,255,0.45);
      font-family: 'Oswald',sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 1.5px; padding: 8px 18px; cursor: pointer;
      transition: filter .15s;
    }
    .cfg-cancel:hover { filter: brightness(1.3); }
    .cfg-confirm {
      background: linear-gradient(135deg,#a07018,#c9953a); border: none;
      border-radius: 8px; color: #0c0c0c;
      font-family: 'Oswald',sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 2px; padding: 8px 22px; cursor: pointer;
      transition: filter .15s, transform .12s;
    }
    .cfg-confirm:hover { filter: brightness(1.12); }
    .cfg-confirm:active { transform: scale(0.96); }
  </style>
</head>
<body>

<!-- 配置弹窗 -->
<div id="cfg-overlay" class="hidden">
  <div class="cfg-box">
    <div class="cfg-title">选择启用的级别</div>
    <div class="cfg-levels" id="cfg-levels"></div>
    <div class="cfg-actions">
      <button class="cfg-select-all" onclick="cfgToggleAll()">全选 / 全不选</button>
      <button class="cfg-cancel" onclick="closeCfg()">取消</button>
      <button class="cfg-confirm" onclick="applyCfg()">确认</button>
    </div>
  </div>
</div>

<!-- 密码 -->
<div id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">请输入密码</div>
    <input class="pw-input" id="pw-input" type="password" maxlength="10" placeholder="······"
      autofocus onkeydown="if(event.key==='Enter')pwSubmit()">
    <div class="pw-error" id="pw-error"></div>
    <button class="pw-btn" onclick="pwSubmit()">确认</button>
  </div>
</div>

<!-- 涨盲动画 -->
<div class="level-flash" id="level-flash">
  <div class="lf-tag">盲注上涨</div>
  <div class="lf-bar"></div>
  <div class="lf-blinds" id="lf-blinds">—</div>
  <div class="lf-level" id="lf-level">LEVEL 2</div>
</div>

<!-- 结束遮罩 -->
<div class="finished-overlay" id="fin">
  <div class="finished-text">GAME OVER</div>
  <button class="btn btn-reset" onclick="resetTimer()">重新开始</button>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div class="brand">27 NUTS · BAR</div>
  <div class="table-title-wrap">
    <span class="table-title" id="table-title" contenteditable="true" spellcheck="false"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">27 NUTS</span>
    <span class="edit-icon" onclick="document.getElementById('table-title').focus()">✏️</span>
  </div>
  <div class="topbar-right">
    <button class="cfg-btn" onclick="openCfg()" title="配置级别">⚙️</button>
    <button class="tv-btn" onclick="toggleTV()" title="切换TV模式">📺</button>
  </div>
</div>

<!-- 三列主体 -->
<div class="main">

  <!-- 左：总杯数 -->
  <div class="col col-cups">
    <div class="cups-label">总杯数</div>
    <div class="cups-number" id="cups">0</div>
  </div>

  <!-- 中：计时器 -->
  <div class="col col-timer">
    <div class="level-info" id="level-info">LEVEL 1 / 25</div>
    <div class="progress-wrap" style="width:180px;margin-bottom:6px">
      <div class="progress-fill" id="prog" style="width:100%"></div>
    </div>
    <div class="timer-digits" id="timer">5:00</div>
    <div class="blind-now-big" id="blind-now">100 / 200</div>
    <div class="next-wrap">
      <div class="next-label">下一级别</div>
      <div class="next-value" id="blind-next">200 / 400</div>
    </div>
  </div>

  <!-- 右：筹码 2×2 -->
  <div class="col col-next">
    <div class="chips-grid" id="chips-grid"></div>
  </div>

</div>

<!-- 右下角浮动加减酒 -->
<div class="cup-float" id="cup-float">
  <span class="cup-float-label">总杯数</span>
  <button class="btn btn-cup-sub" onclick="changeCup(-1)">−</button>
  <button class="btn btn-cup-add" onclick="changeCup(1)">+</button>
</div>

<!-- 底栏 -->
<div class="bottombar">
  <!-- 控制按钮 -->
  <div class="controls-area">
    <button class="btn btn-start" onclick="startTimer()">▶ 开始</button>
    <button class="btn btn-pause" onclick="pauseTimer()">⏸ 暂停</button>
    <button class="btn btn-reset" onclick="resetTimer()">↺ 重置</button>
    <div class="settings-inline">
      <span class="settings-label">每级</span>
      <input class="settings-input" type="number" id="dur" value="6" min="1" max="120" onchange="setDuration()">
      <span class="settings-label">分钟</span>
    </div>
  </div>
</div>

<script>
  // ── 密码 ──
  function pwSubmit() {
    if (document.getElementById('pw-input').value === '27') {
      document.getElementById('pw-overlay').classList.add('hidden');
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = '密码错误';
      err.classList.remove('shake');
      void err.offsetWidth;
      err.classList.add('shake');
      document.getElementById('pw-input').value = '';
    }
  }

  // ── 筹码 SVG ──
  function chipSVG(bg, ring, band, val) {
    const id = 'c' + val;
    return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="ta${id}" d="M18,58 A42,42 0 0,1 102,58"/>
        <path id="tb${id}" d="M20,64 A42,42 0 0,0 100,64"/>
      </defs>
      <ellipse cx="60" cy="65" rx="50" ry="7" fill="rgba(0,0,0,0.4)"/>
      <circle cx="60" cy="58" r="56" fill="${ring}"/>
      <circle cx="60" cy="58" r="50" fill="${bg}"/>
      <circle cx="60" cy="58" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <rect x="10" y="49" width="100" height="19" fill="${band}" rx="1.5"/>
      <text x="16" y="64" font-family="Arial Black,sans-serif" font-size="27" font-weight="900" fill="white">27</text>
      <text x="57" y="63" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="white">NUTS</text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.8)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#ta${id}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.65)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#tb${id}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
    </svg>`;
  }

  const CHIPS = [
    { bg:'#2e2e2e', ring:'#585858', band:'#1a1a1a', label:'100'  },
    { bg:'#cc1020', ring:'#880010', band:'#880010', label:'500'  },
    { bg:'#f07820', ring:'#b84e08', band:'#c05a10', label:'1000' },
    { bg:'#5848b8', ring:'#362898', band:'#362898', label:'5000' },
  ];

  const grid = document.getElementById('chips-grid');
  CHIPS.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'chip-wrap';
    wrap.innerHTML = chipSVG(c.bg, c.ring, c.band, c.label) +
      `<div class="chip-label">${c.label}</div>`;
    grid.appendChild(wrap);
  });

  // ── 时钟 ──
  const BLINDS_ALL = [
    100,200,300,400,500,600,700,800,900,1000,
    1500,2000,3000,4000,5000,6000,7000,8000,9000,10000,
    15000,20000,30000,40000,50000
  ].map(sb => ({ sb, bb: sb * 2 }));

  // 默认全部启用
  const activeFlags = BLINDS_ALL.map(() => true);
  let BLINDS = [...BLINDS_ALL];

  // ── 配置弹窗 ──
  function buildCfgList() {
    const container = document.getElementById('cfg-levels');
    container.innerHTML = '';
    BLINDS_ALL.forEach((b, i) => {
      const label = document.createElement('label');
      label.className = 'cfg-level-item';
      label.innerHTML = `
        <input type="checkbox" id="cfg-cb-${i}" ${activeFlags[i] ? 'checked' : ''}>
        <span class="cfg-level-text">Lv${i+1} &nbsp; ${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}</span>
      `;
      container.appendChild(label);
    });
  }

  function openCfg() {
    buildCfgList();
    document.getElementById('cfg-overlay').classList.remove('hidden');
  }
  function closeCfg() {
    document.getElementById('cfg-overlay').classList.add('hidden');
  }
  function cfgToggleAll() {
    const cbs = document.querySelectorAll('#cfg-levels input[type=checkbox]');
    const anyChecked = [...cbs].some(cb => cb.checked);
    cbs.forEach(cb => cb.checked = !anyChecked);
  }
  function applyCfg() {
    const cbs = document.querySelectorAll('#cfg-levels input[type=checkbox]');
    let hasAny = false;
    cbs.forEach((cb, i) => { activeFlags[i] = cb.checked; if (cb.checked) hasAny = true; });
    if (!hasAny) { activeFlags[0] = true; } // 至少保留一级
    BLINDS = BLINDS_ALL.filter((_, i) => activeFlags[i]);
    closeCfg();
    if (!S.running) {
      S.level = 0; S.timeLeft = S.duration;
      render();
    } else {
      // 当前级别超出范围则回到最后一级
      if (S.level >= BLINDS.length) S.level = BLINDS.length - 1;
      render();
    }
  }

  const S = { cups:0, level:0, timeLeft:360, duration:360, running:false, iv:null, warned:false };

  // ── 提示音 ──
  function playTone(freq, startTime, duration, ctx, gainVal = 0.25) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    o.start(startTime); o.stop(startTime + duration);
  }

  // 1分钟警告：三声短音 叮叮叮
  function playWarning() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.28, 0.56].forEach((t, i) =>
        playTone(880 + i * 110, ctx.currentTime + t, 0.22, ctx, 0.22));
    } catch(e) {}
  }

  // 涨盲音效：上扬三音 + 持续余音
  function playLevelUp() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[523, 0], [659, 0.18], [784, 0.36], [1047, 0.58]].forEach(([f, t]) =>
        playTone(f, ctx.currentTime + t, 0.55, ctx, 0.28));
    } catch(e) {}
  }

  // ── 涨盲动画 ──
  function showLevelFlash() {
    const b = BLINDS[S.level];
    document.getElementById('lf-blinds').textContent =
      `${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}`;
    document.getElementById('lf-level').textContent = `LEVEL ${S.level + 1}`;
    const el = document.getElementById('level-flash');
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function fmt(sec) {
    return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
  }

  function render() {
    const b  = BLINDS[S.level];
    const nb = S.level < BLINDS.length - 1 ? BLINDS[S.level + 1] : null;
    const el = document.getElementById('timer');
    el.textContent = fmt(S.timeLeft);
    el.className   = 'timer-digits' + (S.timeLeft <= 30 && S.running ? ' warning' : '');
    document.getElementById('prog').style.width = (S.timeLeft / S.duration * 100) + '%';
    document.getElementById('blind-now').textContent  = `${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}`;
    document.getElementById('blind-next').textContent = nb
      ? `${nb.sb.toLocaleString()} / ${nb.bb.toLocaleString()}` : '最终级别';
    document.getElementById('level-info').textContent =
      `LEVEL ${S.level + 1} / ${BLINDS.length}`;
  }

  function tick() {
    if (S.timeLeft > 0) {
      S.timeLeft--;
      if (S.timeLeft === 60 && !S.warned) {
        S.warned = true;
        playWarning();
      }
    } else if (S.level < BLINDS.length - 1) {
      S.level++; S.timeLeft = S.duration; S.warned = false;
      playLevelUp();
      showLevelFlash();
    } else {
      clearInterval(S.iv); S.running = false;
      document.getElementById('fin').classList.add('show');
    }
    render();
  }

  function startTimer() {
    if (S.running) return;
    S.running = true; S.iv = setInterval(tick, 1000);
  }
  function pauseTimer() {
    if (!S.running) return;
    clearInterval(S.iv); S.running = false;
  }
  function resetTimer() {
    clearInterval(S.iv); S.running = false;
    S.level = 0; S.timeLeft = S.duration;
    S.cups = 0; S.warned = false;
    document.getElementById('cups').textContent = 0;
    document.getElementById('fin').classList.remove('show');
    render();
  }
  function changeCup(d) {
    S.cups = Math.max(0, S.cups + d);
    document.getElementById('cups').textContent = S.cups;
  }
  function setDuration() {
    const v = parseInt(document.getElementById('dur').value, 10);
    if (!v || v < 1) return;
    S.duration = v * 60;
    if (!S.running) { S.timeLeft = S.duration; render(); }
  }
  function toggleTV() {
    document.body.classList.toggle('tv-mode');
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
      o.start(); o.stop(ctx.currentTime + 1);
    } catch(e) {}
  }

  render();
</script>
</body>
</html>
