<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27 NUTS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(160deg, #0e3a8a 0%, #1260c0 45%, #0a2d70 100%);
      font-family: 'Oswald', 'Arial Black', sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 20px 32px 16px;
      gap: 8px;
    }

    /* ── 顶行：桌名 ── */
    .row-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
    }

    .table-title {
      color: #ffd700;
      font-size: clamp(22px, 3.5vw, 44px);
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,215,0,0.7);
      outline: none;
      border-bottom: 2px solid transparent;
      transition: border-color .2s;
      cursor: text;
      min-width: 40px;
      text-align: center;
    }
    .table-title:focus { border-bottom-color: #ffd700; }

    .edit-icon {
      color: rgba(255,215,0,.3);
      font-size: 14px;
      cursor: pointer;
      transition: color .2s;
    }
    .edit-icon:hover { color: #ffd700; }

    /* TV/控制 切换按钮 */
    .tv-btn {
      position: absolute;
      right: 0;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      transition: all .2s;
    }
    .tv-btn:hover { color:#ffd700; border-color:rgba(255,215,0,0.5); }
    body.tv-mode .tv-btn { opacity:.08; }
    body.tv-mode .tv-btn:hover { opacity:1; }

    /* ── 中间主行：杯数 | 计时 | 下一级别 ── */
    .row-main {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      min-height: 0;
    }

    /* 左列：总杯数 */
    .col-cups {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding-right: 24px;
      border-right: 1px solid rgba(255,255,255,0.15);
    }

    .cups-label {
      color: #ffd700;
      font-size: clamp(14px, 2vw, 24px);
      font-weight: 700;
      letter-spacing: 2px;
    }

    .cups-number {
      color: #ffffff;
      font-size: clamp(72px, 13vw, 150px);
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(255,255,255,0.2);
    }

    .cup-btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    /* 中列：计时器 + 当前盲注 */
    .col-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .timer-digits {
      color: #ffffff;
      font-size: clamp(90px, 20vw, 220px);
      font-weight: 700;
      font-family: 'Oswald', monospace;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 40px rgba(255,255,255,0.25);
      transition: color .3s;
    }

    .timer-digits.warning {
      color: #ff5252;
      text-shadow: 0 0 30px rgba(255,82,82,0.8);
      animation: blink .55s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .blind-now {
      color: rgba(255,255,255,0.75);
      font-size: clamp(18px, 3.5vw, 46px);
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* 右列：下一级别 */
    .col-next {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-left: 24px;
      border-left: 1px solid rgba(255,255,255,0.15);
    }

    .next-label {
      color: #ffd700;
      font-size: clamp(14px, 1.8vw, 22px);
      letter-spacing: 2px;
    }

    .next-value {
      color: rgba(255,255,255,0.65);
      font-size: clamp(18px, 3vw, 38px);
      font-weight: 700;
      letter-spacing: 1px;
      text-align: right;
    }

    .level-badge {
      margin-top: 6px;
      color: rgba(255,255,255,0.4);
      font-size: clamp(10px, 1.2vw, 15px);
      letter-spacing: 1.5px;
    }

    /* 进度条 */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 1s linear;
    }

    /* ── 底行：筹码 + 控制 ── */
    .row-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .chips-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    .chip-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .chip-wrap svg {
      width: clamp(48px, 7vw, 82px);
      height: clamp(48px, 7vw, 82px);
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
    }
    .chip-val {
      color: rgba(255,255,255,0.6);
      font-size: clamp(9px, 1.1vw, 14px);
      letter-spacing: 1px;
    }

    /* ── 控制按钮 ── */
    .controls-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(12px, 1.3vw, 16px);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: transform .12s, filter .12s;
      white-space: nowrap;
    }
    .btn:hover  { transform:scale(1.06); filter:brightness(1.2); }
    .btn:active { transform:scale(0.95); }
    .btn-start  { background:linear-gradient(135deg,#2d6a30,#43a047); color:#fff; }
    .btn-pause  { background:linear-gradient(135deg,#7a3d10,#c96820); color:#fff; }
    .btn-reset  { background:linear-gradient(135deg,#6a1515,#b71c1c); color:#fff; }
    .btn-cup-add { background:linear-gradient(135deg,#c9953a,#ffd700); color:#0c0c0c; font-size:clamp(16px,2vw,22px); padding:5px 14px; border-radius:8px; font-weight:900; }
    .btn-cup-sub { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.6); font-size:clamp(16px,2vw,22px); padding:5px 14px; border-radius:8px; font-weight:900; }

    .settings-inline { display:flex; align-items:center; gap:6px; }
    .settings-label  { color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:1px; }
    .settings-input  {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2);
      color:#ffd700; padding:5px 8px; border-radius:6px; width:50px;
      text-align:center; font-size:14px; font-family:'Oswald',sans-serif; font-weight:bold;
    }
    .settings-input:focus { outline:none; border-color:#ffd700; }

    /* TV模式 */
    body.tv-mode .controls-area { display:none; }
    body.tv-mode .cup-btns      { display:none; }

    /* ── 结束遮罩 ── */
    .finished-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.88);
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:20px; z-index:100;
    }
    .finished-overlay.show { display:flex; }
    .finished-text {
      color:#ffd700; font-size:clamp(44px,8vw,90px); font-weight:700;
      letter-spacing:6px; text-shadow:0 0 40px rgba(255,215,0,0.8);
    }

    /* ── 密码浮窗 ── */
    #pw-overlay {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
    }
    #pw-overlay.hidden { display:none; }
    .pw-box {
      background:linear-gradient(160deg,#0e3a8a,#1260c0);
      border:1px solid rgba(255,215,0,0.4); border-radius:14px;
      padding:32px 28px 24px; display:flex; flex-direction:column;
      align-items:center; gap:16px; min-width:260px; position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
    }
    .pw-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      border-radius:14px 14px 0 0;
      background:linear-gradient(90deg,transparent,#ffd700,transparent);
    }
    .pw-title { color:#ffd700; font-size:16px; letter-spacing:3px; text-transform:uppercase; }
    .pw-input {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.3);
      border-radius:8px; color:#fff; font-family:'Oswald',sans-serif;
      font-size:22px; letter-spacing:6px; text-align:center;
      padding:10px 16px; width:100%; outline:none; transition:border-color .2s;
    }
    .pw-input:focus { border-color:#ffd700; }
    .pw-error { color:#ff5252; font-size:12px; letter-spacing:2px; height:16px; text-transform:uppercase; }
    .pw-error.shake { animation:pwshake .35s ease; }
    @keyframes pwshake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .pw-btn {
      background:linear-gradient(135deg,#c9953a,#ffd700); border:none; border-radius:8px;
      color:#0c0c0c; font-family:'Oswald',sans-serif; font-size:14px; font-weight:700;
      letter-spacing:2px; padding:10px 32px; cursor:pointer; transition:filter .15s,transform .12s;
    }
    .pw-btn:hover { filter:brightness(1.12); }
    .pw-btn:active { transform:scale(0.96); }
  </style>
</head>
<body>

<!-- 密码 -->
<div id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">请输入密码</div>
    <input class="pw-input" id="pw-input" type="password" maxlength="10"
      placeholder="······" autofocus onkeydown="if(event.key==='Enter')pwSubmit()">
    <div class="pw-error" id="pw-error"></div>
    <button class="pw-btn" onclick="pwSubmit()">确认</button>
  </div>
</div>

<!-- 结束 -->
<div class="finished-overlay" id="fin">
  <div class="finished-text">GAME OVER</div>
  <button class="btn btn-reset" onclick="resetTimer()">重新开始</button>
</div>

<!-- 顶行：桌名 -->
<div class="row-title">
  <span class="table-title" id="table-title" contenteditable="true" spellcheck="false"
    onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">27 NUTS</span>
  <span class="edit-icon" onclick="document.getElementById('table-title').focus()">✏️</span>
  <button class="tv-btn" onclick="document.body.classList.toggle('tv-mode')" title="切换TV模式">📺</button>
</div>

<!-- 中行：杯数 | 计时 | 下一级别 -->
<div class="row-main">

  <!-- 左：总杯数 -->
  <div class="col-cups">
    <div class="cups-label">总杯数</div>
    <div class="cups-number" id="cups">0</div>
    <div class="cup-btns">
      <button class="btn btn-cup-sub" onclick="changeCup(-1)">−</button>
      <button class="btn btn-cup-add" onclick="changeCup(1)">+</button>
    </div>
  </div>

  <!-- 中：计时 + 当前盲注 -->
  <div class="col-timer">
    <div class="timer-digits" id="timer">5:00</div>
    <div class="blind-now" id="blind-now">100 / 200</div>
    <div class="progress-wrap" style="width:60%;min-width:200px">
      <div class="progress-fill" id="prog" style="width:100%"></div>
    </div>
  </div>

  <!-- 右：下一级别 -->
  <div class="col-next">
    <div class="next-label">下一级别</div>
    <div class="next-value" id="blind-next">200 / 400</div>
    <div class="level-badge" id="level-info">LEVEL 1 / 19</div>
  </div>

</div>

<!-- 底行：筹码 + 控制 -->
<div class="row-bottom">
  <div class="chips-row" id="chips-row"></div>
  <div class="controls-area">
    <button class="btn btn-start" onclick="startTimer()">▶ 开始</button>
    <button class="btn btn-pause" onclick="pauseTimer()">⏸ 暂停</button>
    <button class="btn btn-reset" onclick="resetTimer()">↺ 重置</button>
    <div class="settings-inline">
      <span class="settings-label">每级</span>
      <input class="settings-input" type="number" id="dur" value="5" min="1" max="120" onchange="setDuration()">
      <span class="settings-label">分钟</span>
    </div>
  </div>
</div>

<script>
  // ── 密码 ──
  function pwSubmit() {
    if (document.getElementById('pw-input').value === '272727') {
      document.getElementById('pw-overlay').classList.add('hidden');
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = '密码错误';
      err.classList.remove('shake');
      void err.offsetWidth;
      err.classList.add('shake');
      document.getElementById('pw-input').value = '';
    }
  }

  // ── 筹码 SVG ──
  function chipSVG(bg, ring, band, uid) {
    return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="ta${uid}" d="M18,58 A42,42 0 0,1 102,58"/>
        <path id="tb${uid}" d="M20,64 A42,42 0 0,0 100,64"/>
      </defs>
      <ellipse cx="60" cy="65" rx="50" ry="7" fill="rgba(0,0,0,0.4)"/>
      <circle cx="60" cy="58" r="56" fill="${ring}"/>
      <circle cx="60" cy="58" r="50" fill="${bg}"/>
      <circle cx="60" cy="58" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <rect x="10" y="49" width="100" height="19" fill="${band}" rx="1.5"/>
      <text x="16" y="64" font-family="Arial Black,sans-serif" font-size="27" font-weight="900" fill="white">27</text>
      <text x="57" y="63" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="white">NUTS</text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.85)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#ta${uid}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.65)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#tb${uid}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
    </svg>`;
  }

  const CHIPS = [
    { bg:'#f07820', ring:'#b84e08', band:'#c05a10', label:'100'   },
    { bg:'#5848b8', ring:'#362898', band:'#362898', label:'1000'  },
    { bg:'#cc1020', ring:'#880010', band:'#880010', label:'5000'  },
    { bg:'#282828', ring:'#101010', band:'#101010', label:'20000' },
  ];
  const row = document.getElementById('chips-row');
  CHIPS.forEach((c, i) => {
    const w = document.createElement('div');
    w.className = 'chip-wrap';
    w.innerHTML = chipSVG(c.bg, c.ring, c.band, i) +
      `<div class="chip-val">${c.label}</div>`;
    row.appendChild(w);
  });

  // ── 时钟 ──
  const BLINDS = [];
  for (let sb = 100; sb <= 1900; sb += 100) BLINDS.push({ sb, bb: sb * 2 });

  const S = { cups:0, level:0, timeLeft:300, duration:300, running:false, iv:null };

  const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

  function render() {
    const b  = BLINDS[S.level];
    const nb = S.level < BLINDS.length - 1 ? BLINDS[S.level+1] : null;
    const el = document.getElementById('timer');
    el.textContent = fmt(S.timeLeft);
    el.className   = 'timer-digits' + (S.timeLeft <= 30 && S.running ? ' warning' : '');
    document.getElementById('prog').style.width      = (S.timeLeft/S.duration*100)+'%';
    document.getElementById('blind-now').textContent  = `${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}`;
    document.getElementById('blind-next').textContent = nb
      ? `${nb.sb.toLocaleString()} / ${nb.bb.toLocaleString()}` : '最终级别';
    document.getElementById('level-info').textContent = `LEVEL ${S.level+1} / ${BLINDS.length}`;
  }

  function tick() {
    if (S.timeLeft > 0) {
      S.timeLeft--;
    } else if (S.level < BLINDS.length-1) {
      S.level++; S.timeLeft = S.duration; playBeep();
    } else {
      clearInterval(S.iv); S.running = false;
      document.getElementById('fin').classList.add('show');
    }
    render();
  }

  function startTimer() { if(S.running)return; S.running=true; S.iv=setInterval(tick,1000); }
  function pauseTimer() { if(!S.running)return; clearInterval(S.iv); S.running=false; }
  function resetTimer() {
    clearInterval(S.iv); S.running=false; S.level=0; S.timeLeft=S.duration;
    document.getElementById('fin').classList.remove('show'); render();
  }
  function changeCup(d) {
    S.cups = Math.max(0, S.cups+d);
    document.getElementById('cups').textContent = S.cups;
  }
  function setDuration() {
    const v = parseInt(document.getElementById('dur').value,10);
    if(!v||v<1) return;
    S.duration = v*60;
    if(!S.running){ S.timeLeft=S.duration; render(); }
  }
  function playBeep() {
    try {
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.setValueAtTime(880,ctx.currentTime);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1);
      o.start(); o.stop(ctx.currentTime+1);
    } catch(e){}
  }

  render();
</script>
</body>
</html>
