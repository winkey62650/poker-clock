<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0c">
  <title>poker-clock 已暂停</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.08), transparent 36%),
        #0c0c0c;
      color: #f5f0e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 18px;
      padding: 32px 24px;
      background: rgba(18,18,18,0.92);
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(212,175,55,0.12);
      color: #d4af37;
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      color: #d4af37;
      margin-bottom: 12px;
    }
    p {
      color: rgba(245,240,232,0.72);
      font-size: clamp(15px, 2.8vw, 18px);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Temporarily Paused</div>
    <h1>poker-clock 已暂停访问</h1>
    <p>这个页面当前已暂停托管，稍后恢复。</p>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(registrations => Promise.all(registrations.map(registration => registration.unregister())))
        .then(() => 'caches' in window ? caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))) : null)
        .catch(() => {});
    }
  </script>
</body>
</html>
